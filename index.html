<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>法舟同航 - 法律全文</title>
  <style>
    body { font-family: "Microsoft Yahei", sans-serif; background-color: #f5f7fa; margin: 0; padding: 0; }
    .page-container { font-family: "SimSun", 宋体; line-height: 2; max-width: 1000px; margin: 0 auto; padding: 40px 50px; background: #fff; min-height: calc(100vh - 120px); border-radius: 0 0 12px 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .main-title { font-size: 38px; font-weight: bold; color: #1a5276; padding: 15px 0; background: #f0f8ff; border-radius: 8px; text-align: center; }
    .sub-title { text-align: center; font-size: 28px; font-weight: bold; margin-top: 20px; margin-bottom: 15px; color: #2980b9; }
    .sub-info { text-align: center; font-size: 18px; margin-bottom: 30px; color: #666; font-style: italic; }
    .chapter-title { text-align: center; font-size: 20px; font-weight: bold; margin: 40px 0 25px; color: #1a5276; position: relative; }
    .chapter-title::after { content: ""; display: block; width: 80px; height: 2px; background-color: #3498db; margin: 10px auto 0; }
    .catalog { margin: 0 auto 30px; padding-left: 2em; list-style: none; max-width: 600px; }
    .catalog li { margin: 8px 0; color: #444; }
    .law-content { font-weight: normal; padding-left: 1em; margin: 15px 0; color: #444; padding-top: 8px; padding-bottom: 8px; border-bottom: 1px solid #f0f4f8; }
    .law-paragraph { text-indent: 2em; margin: 10px 0; color: #444; }
  </style>
</head>
<body>
  <div class="page-container">
    <div class="main-title">法舟同航法律普及</div>
    <div class="sub-title">中华人民共和国反电信网络诈骗法</div>
    <div class="sub-info">（2022年9月2日第十三届全国人民代表大会常务委员会第三十六次会议通过）</div>
    <div class="chapter-title">目录</div>
    <ul class="catalog">
      <li>第一章 总则</li>
      <li>第二章 预防与教育</li>
      <li>第三章 监测与防范</li>
      <li>第四章 侦查与处置</li>
      <li>第五章 法律责任</li>
      <li>第六章 附则</li>
    </ul>
    <div class="chapter-title">第一章 总则</div>
    <div class="law-content">
      <span class="law-title">第一条</span>
      为了预防、遏制和惩治电信网络诈骗活动，加强反电信网络诈骗工作，保护公民和组织的合法权益，维护社会稳定和国家安全，根据宪法，制定本法。
    </div>
    <div class="law-content">
      <span class="law-title">第二条</span>
      本法所称电信网络诈骗，是指以非法占有为目的，利用电信网络技术手段，通过远程、非接触等方式，诈骗公私财物的行为。
    </div>
    <div class="law-content">
      <span class="law-title">第三条</span>
      打击治理在中华人民共和国境内实施的电信网络诈骗活动或者中华人民共和国公民在境外实施的电信网络诈骗活动，适用本法。
      <p class="law-paragraph">
        境外的组织、个人针对中华人民共和国境内实施电信网络诈骗活动的，或者为他人针对境内实施电信网络诈骗活动提供产品、服务等帮助的，依照本法有关规定处理和追究责任。
      </p>
    </div>
    <div class="law-content">
      <span class="law-title">第四条</span>
      反电信网络诈骗工作坚持以人民为中心，统筹发展和安全；坚持系统观念、法治思维，注重源头治理、综合治理；坚持齐抓共管、群防群治，全面落实打防管控各项措施，加强社会宣传教育防范；坚持精准防治，保障正常生产经营活动和群众生活便利。
    </div>
    <div class="law-content">
      <span class="law-title">第五条</span>
      反电信网络诈骗工作应当依法进行，维护公民和组织的合法权益。
      <p class="law-paragraph">
        有关部门和单位、个人应当对在反电信网络诈骗工作过程中知悉的国家秘密、商业秘密和个人隐私、个人信息予以保密。
      </p>
    </div>
    <div class="law-content">
      <span class="law-title">第六条</span>
      国务院建立反电信网络诈骗工作机制，统筹协调打击治理工作。
      <p class="law-paragraph">地方各级人民政府组织领导本行政区域内反电信网络诈骗工作，确定反电信网络诈骗目标任务和工作机制，开展综合治理。</p>
      <p class="law-paragraph">公安机关牵头负责反电信网络诈骗工作，金融、电信、网信、市场监管等有关部门依照职责履行监管主体责任，负责本行业领域反电信网络诈骗工作。</p>
      <p class="law-paragraph">人民法院、人民检察院发挥审判、检察职能作用，依法防范、惩治电信网络诈骗活动。</p>
      <p class="law-paragraph">电信业务经营者、银行业金融机构、非银行支付机构、互联网服务提供者承担风险防控责任，建立反电信网络诈骗内部控制机制和安全责任制度，加强新业务涉诈风险安全评估。</p>
    </div>
    <div class="law-content">
      <span class="law-title">第七条</span>
      有关部门、单位在反电信网络诈骗工作中应当密切协作，实现跨行业、跨地域协同配合、快速联动，加强专业队伍建设，有效打击治理电信网络诈骗活动。
    </div>
     <div class="law-content">
      <span class="law-title">第八条</span>
      各级人民政府和有关部门应当加强反电信网络诈骗宣传，普及相关法律和知识，提高公众对各类电信网络诈骗方式的防骗意识和识骗能力。
      <p class="law-paragraph">
        教育行政、市场监管、民政等有关部门和村民委员会、居民委员会，应当结合电信网络诈骗受害群体的分布等特征，加强对老年人、青少年等群体的宣传教育，增强反电信网络诈骗宣传教育的针对性、精准性，开展反电信网络诈骗宣传教育进学校、进企业、进社区、进农村、进家庭等活动。
      </p>
      <p class="law-paragraph">
        各单位应当加强内部防范电信网络诈骗工作，对工作人员开展防范电信网络诈骗教育；个人应当加强电信网络诈骗防范意识。单位、个人应当协助、配合有关部门依照本法规定开展反电信网络诈骗工作。
      </p>
    </div>
    <div class="chapter-title">第二章 电信治理</div>
    <div class="law-content">
      <span class="law-title">第九条</span>
      电信业务经营者应当依法全面落实电话用户真实身份信息登记制度。
      <p class="law-paragraph">基础电信企业和移动通信转售企业应当承担对代理商落实电话用户实名制管理责任，在协议中明确代理商实名制登记的责任和有关违约处置措施。
      </p>
    </div>
    <div class="law-content">
      <span class="law-title">第十条</span>
      办理电话卡不得超出国家有关规定限制的数量。
      <p class="law-paragraph">对经识别存在异常办卡情形的，电信业务经营者有权加强核查或者拒绝办卡。具体识别办法由国务院电信主管部门制定。
      </p>
      <p class="law-paragraph">
      国务院电信主管部门组织建立电话用户开卡数量核验机制和风险信息共享机制，并为用户查询名下电话卡信息提供便捷渠道。
      </p>
    </div>
     <div class="law-content">
      <span class="law-title">第十一条</span>
      电信业务经营者对监测识别的涉诈异常电话卡用户应当重新进行实名核验，根据风险等级采取有区别的、相应的核验措施。对未按规定核验或者核验未通过的，电信业务经营者可以限制、暂停有关电话卡功能。
     </div>
     <div class="law-content">
      <span class="law-title">第十二条</span>
      电信业务经营者建立物联网卡用户风险评估制度，评估未通过的，不得向其销售物联网卡；严格登记物联网卡用户身份信息；采取有效技术措施限定物联网卡开通功能、使用场景和适用设备。
      <p class="law-paragraph">单位用户从电信业务经营者购买物联网卡再将载有物联网卡的设备销售给其他用户的，应当核验和登记用户身份信息，并将销量、存量及用户实名信息传送给号码归属的电信业务经营者。
      </p>
      <p class="law-paragraph">
      电信业务经营者对物联网卡的使用建立监测预警机制。对存在异常使用情形的，应当采取暂停服务、重新核验身份和使用场景或者其他合同约定的处置措施。
      </p>
    </div>
    <div class="law-content">
      <span class="law-title">第十三条</span>
      电信业务经营者应当规范真实主叫号码传送和电信线路出租，对改号电话进行封堵拦截和溯源核查。
      <p class="law-paragraph">电信业务经营者应当严格规范国际通信业务出入口局主叫号码传送，真实、准确向用户提示来电号码所属国家或者地区，对网内和网间虚假主叫、不规范主叫进行识别、拦截。
      </p>
    </div>
     <div class="law-content">
      <span class="law-title">第十四条</span>
     任何单位和个人不得非法制造、买卖、提供或者使用下列设备、软件：
      <p class="law-paragraph">（一）电话卡批量插入设备；</p>
      <p class="law-paragraph">（二）具有改变主叫号码、虚拟拨号、互联网电话违规接入公用电信网络等功能的设备、软件；</p>
      <p class="law-paragraph">（三）批量账号、网络地址自动切换系统，批量接收提供短信验证、语音验证的平台；</p>
      <p class="law-paragraph">（四）其他用于实施电信网络诈骗等违法犯罪的设备、软件。</p>
      <p class="law-paragraph">电信业务经营者、互联网服务提供者应当采取技术措施，及时识别、阻断前款规定的非法设备、软件接入网络，并向公安机关和相关行业主管部门报告。</p>
    </div>
  </div>

    <div class="chapter-title">为推进高水平对外开放 保护对外贸易经营者合法权益</div>
    <div class="sub-info">《中国人大》全媒体记者 江珊  来源： 《中国人大》杂志2026年第1期  2026年02月12日 09:18</div>
    <div class="law-paragraph">
      对外贸易是我国开放型经济的重要组成部分和国民经济发展的重要推动力量。对外贸易法是对外贸易领域的基础性法律。2025年12月27日，十四届全国人大常委会第十九次会议表决通过新修订的对外贸易法，自2026年3月1日起施行。
    </div>
    <div class="law-paragraph">
      本次修法贯彻落实党中央关于推动对外贸易高质量发展的决策部署，是我国在全球经贸格局深刻变化、国际规则加速重构背景下的重要举措，对推进高水平对外开放、维护对外贸易秩序、保护对外贸易经营者合法权益具有重要意义。
    </div>
    <div class="law-paragraph">
      新修订的对外贸易法共11章83条，积极适应对外贸易发展趋势和环境变化，统筹发展和安全，进一步充实对外贸易工作总体要求、落实对外贸易领域改革举措、优化对外贸易发展环境等。
    </div>
     <div class="law-img">
      <img src="2-1.jpg" alt="对外开放法律动态">
    </div>
     <div class="sub-info">近年来，我国对外贸易繁荣发展。图/视觉中国</div>
    <div class="law-paragraph">
      现行对外贸易法于1994年施行，2004年首次修订。近年来，对外贸易领域出现了新情况新变化，外贸体制改革不断深化，外贸新业态新模式蓬勃发展，相关改革创新发展成果需通过法治方式及时巩固。因此，有必要对现行法作针对性修订。十四届全国人大常委会第十七次会议对对外贸易法修订草案进行了初次审议。会后，修订草案通过中国人大网等向社会公开征求意见，范围涵盖社会公众、对外贸易经营者、国内外商会、贸易协会、企业等个人和组织，共收到43名群众提出的133条意见，另收到群众来信3封。修订草案还印发中央有关部门、地方和部分基层立法联系点等征求意见，共收到18个联系点提出的656条意见建议。社会公众主要对完善货物进出口与技术进出口制度、规范对外贸易秩序、完善对外贸易促进相关措施、完善法律责任等提出了意见建议。
    </div>
    <div class="law-paragraph">
    十四届全国人大常委会第十九次会议于2025年12月23日分组审议了对外贸易法修订草案二审稿。分组审议中，委员们认为，此次修法是面对当今国际贸易领域严峻复杂环境，以法治保障我国对外贸易秩序的重要举措，修订草案二审稿整体比较成熟。
    </div>
    <div class="law-paragraph">
    为进一步体现党中央关于对外贸易高质量发展的部署和要求，新修订的对外贸易法明确了对外贸易工作应当推进贸易强国建设、国家维护公平公正的国际经济贸易秩序、国家支持贸易促进平台提升功能和服务水平等相关规定，规定国家推动对外贸易平衡发展，支持和促进多元化、韧性强的国际运输通道体系建设，完善对外贸易物流服务。
    </div>
    <div class="law-paragraph">
    发展数字贸易、绿色贸易是推动贸易创新发展的重要着力点。“十五五”规划建议提出，“拓展中间品贸易、绿色贸易”、“创新发展数字贸易，有序扩大数字领域开放”。日前举行的中央经济工作会议提出，积极发展数字贸易、绿色贸易。新修订的对外贸易法明确规定了支持发展数字贸易、绿色贸易的相关内容，具体包括：国家根据对外贸易发展的需要，促进跨境金融服务体系建设；支持对外贸易数字化发展，推动数字证书、电子签名等国际互认，提升对外贸易便利化水平；推动与绿色贸易有关的产品标准、认证、标识体系建设；支持和促进对外贸易人才队伍建设，为对外贸易高质量发展提供人才支撑。
     </div>
     <div class="law-paragraph">
     新修订的对外贸易法进一步就国际服务贸易、对外贸易救济等作出规定，明确了常见的服务贸易模式，规定国家鼓励以跨境交付、境外消费、商业存在、自然人移动等各种模式开展国际服务贸易；为应对贸易风险和贸易环境变化的影响，规定有关人民政府可以根据需要建立符合世界贸易组织规则等的贸易调整援助制度。
     </div>
     <div class="law-paragraph">
     关于法律责任的设置，新修订的对外贸易法充分考虑对外贸易经营者中不少属于中小微企业的规模和特点，对相关条款中罚款的规定作了相应修改，不限定最低罚款数额，以便于主管部门根据个案具体情况准确适用。
     </div>
  </div>

        const prevBtn = document.querySelector('.prev-btn');
        const nextBtn = document.querySelector('.next-btn');
        let currentIndex = 0;
        const totalSlides = 4;

        function goToSlide(index) {
            slide.style.transform = `translateX(-${index * 25}%)`;
            indicators.forEach((indicator, i) => {
                indicator.classList.toggle('active', i === index);
            });
            currentIndex = index;
        }

        nextBtn.addEventListener('click', () => {
            const nextIndex = (currentIndex + 1) % totalSlides;
            goToSlide(nextIndex);
        });

        prevBtn.addEventListener('click', () => {
            const prevIndex = (currentIndex - 1 + totalSlides) % totalSlides;
            goToSlide(prevIndex);
        });

        indicators.forEach((indicator, index) => {
            indicator.addEventListener('click', () => {
                goToSlide(index);
            });
        });

        setInterval(() => {
            const nextIndex = (currentIndex + 1) % totalSlides;
            goToSlide(nextIndex);
        }, 4000);
