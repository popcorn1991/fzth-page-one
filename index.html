    </div>

        const navItems = document.querySelectorAll('.nav-item');

        function setActiveTab(pageKey) {
            navItems.forEach(item => {
                item.classList.toggle('active', item.dataset.page === pageKey);
            });
        }

        function loadPage(pageKey) {
            const page = pageTemplates[pageKey];
            if (!page) return;
            document.title = page.title;
            breadcrumb.innerHTML = `${page.breadcrumb}<hr>`;
            frame.srcdoc = page.content;
            setActiveTab(pageKey);
        }

        document.getElementById('navBar').addEventListener('click', (e) => {
            const target = e.target.closest('.nav-item');
            if (!target) return;
            const pageKey = target.dataset.page;
            loadPage(pageKey);
        });

        // 初始化首页
        loadPage('home');

        // 轮播图逻辑
        const slide = document.querySelector('.carousel-slide');
        const indicators = document.querySelectorAll('.indicator');
        const prevBtn = document.querySelector('.prev-btn');
        const nextBtn = document.querySelector('.next-btn');
        let currentIndex = 0;
        const totalSlides = 4;

        function goToSlide(index) {
            slide.style.transform = `translateX(-${index * 25}%)`;
            indicators.forEach((indicator, i) => {
                indicator.classList.toggle('active', i === index);
            });
            currentIndex = index;
        }

        nextBtn.addEventListener('click', () => {
            const nextIndex = (currentIndex + 1) % totalSlides;
            goToSlide(nextIndex);
        });

        prevBtn.addEventListener('click', () => {
            const prevIndex = (currentIndex - 1 + totalSlides) % totalSlides;
            goToSlide(prevIndex);
        });

        indicators.forEach((indicator, index) => {
            indicator.addEventListener('click', () => {
                goToSlide(index);
            });
        });

        setInterval(() => {
            const nextIndex = (currentIndex + 1) % totalSlides;
            goToSlide(nextIndex);
        }, 4000);

        // 更新日期
        const now = new Date();
        const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
        document.getElementById('date').textContent = now.toLocaleDateString('zh-CN', options);
    </script>
</body>
</html>
